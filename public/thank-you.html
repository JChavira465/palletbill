<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Received — PalletBill</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f1;color:#1a1a18;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.09);border-radius:16px;padding:48px 40px;max-width:480px;width:100%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.check{width:64px;height:64px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
h1{font-size:24px;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px}
h1 span{color:#1D9E75}
p{font-size:15px;color:#5a5a56;line-height:1.6;margin-bottom:24px}
.inv{background:#f4f4f1;border-radius:10px;padding:14px 20px;font-size:14px;color:#5a5a56;margin-bottom:24px}
.inv strong{color:#1a1a18}
a.btn{display:inline-block;background:#1D9E75;color:#fff;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;text-decoration:none}
a.btn:hover{opacity:0.9}
.footer{margin-top:20px;font-size:12px;color:#9a9a94}
</style>
</head>
<body>
<div class="card">
  <div class="check">✓</div>
  <h1>Payment <span>received!</span></h1>
  <p>Thank you for your payment. A receipt has been sent to your email address. If you have any questions, contact your warehouse provider.</p>
  <div class="inv" id="invInfo"></div>
  <a href="/" class="btn">Back to PalletBill</a>
  <div class="footer">Secured by Stripe · PalletBill</div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const inv = params.get("inv");
  const el = document.getElementById("invInfo");
  if (inv) {
    el.innerHTML = "Invoice <strong>" + inv.replace(/[<>"]/g,"") + "</strong> has been paid.";
  } else {
    el.style.display = "none";
  }
</script>
</body>
</html>
