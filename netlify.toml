[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Netlify Functions runtime — explicitly set to avoid ambiguity
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["stripe"]

# Landing page is the homepage
[[redirects]]
  from = "/"
  to = "/home.html"
  status = 200

# API routes → Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Client payment portal — get-invoice function now exists and validates token
[[redirects]]
  from = "/pay/:invoiceId"
  to = "/.netlify/functions/get-invoice"
  status = 200

# React app at /app (and all sub-routes)
[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

# SPA fallback for other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
